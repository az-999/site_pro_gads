services:
  yii2:
    build: ./yii2
    container_name: site_pro_gads_app
    ports:
      - "6003:80"
    volumes:
      - ./yii2:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      memcached:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_NAME: site_pro_gads
      DB_USER: app
      DB_PASSWORD: app
      MEMCACHED_HOST: memcached

  mysql:
    image: mysql:8.0
    container_name: site_pro_gads_mysql
    ports:
      - "5006:3306"
    environment:
      MYSQL_DATABASE: site_pro_gads
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uapp", "-papp"]
      interval: 5s
      timeout: 5s
      retries: 10

  memcached:
    image: memcached:1.6-alpine
    container_name: site_pro_gads_memcached
    ports:
      - "5001:11211"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: site_pro_gads_pma
    ports:
      - "5009:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: app
      PMA_PASSWORD: app
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
