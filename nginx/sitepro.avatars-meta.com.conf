# Прокси для Site.pro GAds
# Установка на сервере:
#   sudo ln -s /opt/site_pro_gads/nginx/sitepro.avatars-meta.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream site_pro_gads_app {
    server 127.0.0.1:6003;
    keepalive 16;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name sitepro.avatars-meta.com;

    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sitepro.avatars-meta.com;

    ssl_certificate     /opt/site_pro_gads/nginx/ssl/fullchain.cer;
    ssl_certificate_key /opt/site_pro_gads/nginx/ssl/sitepro.avatars-meta.com.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    client_max_body_size 32M;

    access_log /var/log/nginx/sitepro.avatars-meta.com.access.log;
    error_log  /var/log/nginx/sitepro.avatars-meta.com.error.log;

    location / {
        proxy_pass http://site_pro_gads_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
    }
}
